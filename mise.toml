[tools]
go = "latest"

[tasks.build]
description = "Build the qry binary"
run = "go build -o bin/qry ."

[tasks.run]
description = "Run qry (pass args with -- e.g. mise run run -- 'my query')"
run = "go run . $@"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.tidy]
description = "Tidy go modules"
run = "go mod tidy"

[tasks.lint]
description = "Run go vet"
run = "go vet ./..."

[tasks.build-all]
description = "Build qry and all adapters"
run = """
go build -o bin/qry .
go build -o bin/qry-adapter-mock ./adapters/mock/
go build -o bin/qry-adapter-brave-api ./adapters/brave-api/
go build -o bin/qry-adapter-ddg-scrape ./adapters/ddg-scrape/
go build -o bin/qry-adapter-brave-scrape ./adapters/brave-scrape/
go build -o bin/qry-adapter-exa ./adapters/exa/
"""

[tasks.test-e2e]
description = "End-to-end test using the mock adapter"
run = """
mise run build-all
./bin/qry --config ./config.test.toml "what is the latest version of numpy"
"""
